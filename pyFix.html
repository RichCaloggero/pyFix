<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PyFix</title>
</head>
<body>
<h1>PyFix</h1>

<pre class="code" autofocus tabindex="0" aria-label="Python code..." contenteditable>
</pre>
<div class="controls">
<button class="fix" accessKey="f">Fix</button>
</div>

<hr>
<pre class="output"></pre>

<script type="module">
import { fix } from "./pyFix.js";

const $code = document.querySelector(".code");
const $output = document.querySelector(".output");
const $controls = document.querySelector(".controls");
const $fix = document.querySelector(".controls .fix");

$fix.addEventListener("click", e => $output.textContent = fix($code.textContent));
</script>

</body>
</html>
