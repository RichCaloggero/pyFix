<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PyFix</title>
</head>
<body>
<h1>PyFix</h1>

<label id="code-label">Python code...</label>
<br><pre class="code" autofocus tabindex="0" aria-labelledby="code-label" contenteditable>
</pre>
<div class="controls">
<label>Tab size: <input type="number" class="tab-size" value="4"></label>
<button class="fix" accessKey="f">Fix</button>
</div>

<hr>
<pre class="output" style="tab-size: 4"></pre>

<script type="module">
import { fix } from "./pyFix.js";

const $code = document.querySelector(".code");
const $output = document.querySelector(".output");
const $controls = document.querySelector(".controls");
const $fix = document.querySelector(".controls .fix");
const $tabSize = document.querySelector(".tab-size");

$fix.addEventListener("click", e => $output.textContent = fix($code.textContent));
$tabSize.addEventListener("input", e => $output.setAttribute("style", `tab-size: ${$tabSize.value}`));
</script>

</body>
</html>
